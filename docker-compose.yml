services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: autism
      POSTGRES_PASSWORD: autism
      POSTGRES_DB: autism_crawler
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autism -d autism_crawler"]
      interval: 5s
      timeout: 5s
      retries: 5

  crawler:
    build: .
    command: python -m src.main
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  django-admin:
    build: .
    command: python admin_site/manage.py runserver 0.0.0.0:8001
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
